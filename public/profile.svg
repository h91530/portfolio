    <path d="M 60 64 Q 58 70, 60 71 Q 62 70, 60 64" stroke="#d49473" stroke-width="1.2" fill="none" stroke-linecap="round"/>

    <!-- 입 (살짝 미소) -->
    <path d="M 54 75 Q 60 79, 66 75" stroke="#3a2310" stroke-width="1.8" fill="none" stroke-linecap="round"/>

    <!-- 볼 -->
    <ellipse cx="45" cy="69" rx="4" ry="2.8" fill="#f5a89a" opacity="0.5"/>
    <ellipse cx="75" cy="69" rx="4" ry="2.8" fill="#f5a89a" opacity="0.5"/>
