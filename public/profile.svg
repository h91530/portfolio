    <ellipse cx="38.5" cy="62" rx="3" ry="5" fill="#fbc89a"/>
    <ellipse cx="81.5" cy="62" rx="3" ry="5" fill="#fbc89a"/>
    <ellipse cx="38.5" cy="63" rx="1.2" ry="2.4" fill="#d99a72"/>
