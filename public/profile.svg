             Q 50 42, 60 42
             Q 70 42, 76 48
             Q 70 44, 64 45
             Q 60 50, 55 47
             Q 48 45, 42 50 Z"
          fill="#2a1810"/>

    <!-- 가르마 라인 -->
    <path d="M 58 36 Q 58 42, 60 47" stroke="#1a0d06" stroke-width="0.8" fill="none" stroke-linecap="round"/>

    <!-- 눈썹 -->
    <path d="M 47 53 Q 51 51, 56 53" stroke="#2a1810" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M 64 53 Q 69 51, 73 53" stroke="#2a1810" stroke-width="1.8" fill="none" stroke-linecap="round"/>

    <!-- 눈 -->
