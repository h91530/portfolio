    <ellipse cx="69" cy="61" rx="2" ry="2.6" fill="#2a1a0d"/>
    <circle cx="51.6" cy="60.3" r="0.7" fill="#fff"/>
    <circle cx="69.6" cy="60.3" r="0.7" fill="#fff"/>

